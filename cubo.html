<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Nuestros Recuerdos 💚</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

    <!-- Música -->

    <audio id="musicaCubo" loop>

        <source
            src="/music/Coldplay - Yellow (Official Video).mp3"
            type="audio/mpeg">

    </audio>


    <!-- Botón volver -->

    <button
        class="btn-volver"
        onclick="volverInicio()">

        ←

    </button>


    <!-- Título -->

    <div class="titulo-container">

        <h1>
            Nuestros recuerdos 💚
        </h1>

        <p>
            Cada foto guarda un momento especial.
        </p>

    </div>


    <!-- Cubo -->

    <div class="escena">

        <div class="cubo">

            <!-- Frente -->

            <div class="cara frente">

                <img
                    src="/img/Captura5.PNG"
                    alt="Foto 1">

            </div>

            <!-- Atrás -->

            <div class="cara atras">

                <img
                    src="/img/amor1.jpeg"
                    alt="Foto 2">

            </div>

            <!-- Derecha -->

            <div class="cara derecha">

                <img
                    src="/img/amor2.jpeg"
                    alt="Foto 3">

            </div>

            <!-- Izquierda -->

            <div class="cara izquierda">

                <img
                    src="/img/Captura1.PNG"
                    alt="Foto 4">

            </div>

            <!-- Arriba -->

            <div class="cara arriba">

                <img
                    src="/img/patas.jpg"
                    alt="Foto 5">

            </div>

            <!-- Abajo -->

            <div class="cara abajo">

                <img
                    src="/img/Captura4.PNG"
                    alt="Foto 6">

            </div>

        </div>

    </div>


    <!-- Mensaje -->

    <div class="mensaje-final">

        Gracias por formar parte de mi vida 💚

    </div>


    <!-- Bootstrap -->

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- JS -->

    <script src="/js/script.js"></script>

</body>

</html>
